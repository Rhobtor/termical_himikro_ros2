cpgfanet_topic_inference:
  ros__parameters:
    repo_root: /workspace/CPGFANet
    checkpoint_path: /workspace/CPGFANet/weights/160.pth
    model_module: model.CrissCrossAttention_dual_2_sinINF
    model_class: FEANet
    device: cuda:0
    input_width: 480
    input_height: 384
    num_classes: 12
    rgb_scale: 255.0
    thermal_scale: 255.0
    overlay_alpha: 0.45
    overlay_semantic_blend: false
    rgb_topic: /fanet/input/rgb
    thermal_topic: /fanet/input/thermal
    mask_topic: /fanet/segmentation/mask_indices
    color_topic: /fanet/segmentation/mask_color
    overlay_topic: /fanet/segmentation/overlay
    person_centroid_topic: /fanet/person_centroid
    person_centroids_topic: /fanet/person_centroids
    person_count_topic: /fanet/person_count
    publish_mask: false
    publish_color: false
    publish_overlay: true
    publish_person_centroid: true
    publish_person_centroids: true
    publish_person_count: true
    person_class_index: 2
    person_min_pixels: 80
    person_min_bbox_width: 8
    person_min_bbox_height: 18
    person_morph_open_kernel: 3
    person_morph_close_kernel: 5
    draw_person_instances: true
    save_outputs: false
    output_dir: /workspace/CPGFANet/ros2_outputs/live_inference
    enable_perf_logging: true
    perf_log_period_s: 5.0
    perf_window: 50
    perf_warmup_runs: 3
    enable_amp: true
    enable_cudnn_benchmark: true
    enable_cuda_sync_timing: false
    enable_gpu_telemetry: true
    max_pending_pairs: 2
